<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h2 style="text-align:center;">Admin Dashboard</h2>

<table>
<tr>
    <th>ID</th>
    <th>User</th>
    <th>Title</th>
    <th>Category</th>
    <th>Priority</th>
    <th>Status</th>
    <th>Update</th>
</tr>

{% for i in incidents %}
<tr>
    <td>{{ i.id }}</td>
    <td>{{ i.username }}</td>
    <td>{{ i.title }}</td>
    <td>{{ i.category }}</td>
    <td>{{ i.priority }}</td>
    <td>{{ i.status }}</td>
    <td>
        <form method="post" action="/update_status/{{ i.id }}">
            <select name="status">
                <option value="Open">Open</option>
                <option value="In Progress">In Progress</option>
                <option value="Closed">Closed</option>
            </select>
            <button type="submit">Update</button>
        </form>
    </td>
</tr>
{% endfor %}
</table>

<div class="top-links">
    <a href="/logout">🚪 Logout</a>
</div>

</body>
</html>
